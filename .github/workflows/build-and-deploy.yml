name: Build and Sign Registry

on:
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - "scripts/**"
      - "schema/**"

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build registry
        run: bun run build

      - name: Sign registry
        env:
          BRIKA_REGISTRY_PRIVATE_KEY: ${{ secrets.BRIKA_REGISTRY_PRIVATE_KEY }}
        run: bun run sign

      - name: Commit signed registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/verified-plugins.json
          git diff --staged --quiet || git commit -m "chore: build and sign registry [skip ci]"
          git push
